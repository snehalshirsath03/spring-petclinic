name: Java CI

#on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Build, Test & Coverage
        run: mvn -B clean verify

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Sonar Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ secrets.SONAR_ORG }}
            -Dsonar.java.binaries=target/classes
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

  deploy:
    runs-on: ubuntu-latest
    needs: build

    env:
      IMAGE_NAME: spring-petclinic
      IMAGE_TAG: latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Tag Image
        run: docker tag $IMAGE_NAME:$IMAGE_TAG ${{ secrets.ACR_LOGIN_SERVER }}/$IMAGE_NAME:$IMAGE_TAG

      - name: Push to ACR
        run: docker push ${{ secrets.ACR_LOGIN_SERVER }}/$IMAGE_NAME:$IMAGE_TAG

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Deploy to AKS
        run: |
          kubectl set image deployment/spring-petclinic-deployment \
            spring-petclinic=${{ secrets.ACR_LOGIN_SERVER }}/$IMAGE_NAME:$IMAGE_TAG

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/spring-petclinic-deployment
          kubectl get pods
          kubectl get svc

      # ✅ SMOKE TEST (ADDED PROPERLY)
      - name: Smoke Test (HTTP + Health)
        if: github.event_name == 'push'
        run: |
          echo "Waiting for LoadBalancer external endpoint..."

          for i in {1..60}; do
            IP=$(kubectl get svc spring-petclinic-service -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            HOST=$(kubectl get svc spring-petclinic-service -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)

            if [ -n "$IP" ]; then
              ENDPOINT="$IP"
              break
            fi

            if [ -n "$HOST" ]; then
              ENDPOINT="$HOST"
              break
            fi

            echo "External endpoint not assigned yet... retrying"
            sleep 5
          done

          if [ -z "${ENDPOINT:-}" ]; then
            echo "❌ Could not get LoadBalancer external IP/hostname"
            kubectl get svc spring-petclinic-service -o wide || true
            exit 1
          fi

          APP_URL="http://${ENDPOINT}"
          echo "Testing application at: ${APP_URL}"

          echo "Checking home page..."
          curl -fsS "${APP_URL}" > /dev/null

          echo "Checking actuator health..."
          curl -fsS "${APP_URL}/actuator/health" | head -c 300

          echo "✅ Smoke test passed"
